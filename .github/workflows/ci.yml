name: CI with MCP Registry Publish

on:
  push:
    branches: [main, milestone/**, feature/**, feat/**]
  pull_request:

permissions:
  contents: write
  security-events: write

env:
  TOOL_MDBOOK_VERSION: "0.5.0"
  TOOL_MDBOOK_MERMAID_VERSION: "0.17.0"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libz3-dev \
            patchelf

      - name: Install Clippy SARIF converter
        run: cargo install clippy-sarif --locked

      - name: Generate Clippy SARIF
        run: |
          cargo clippy --workspace --all-targets --features 'audit,autoresearch,b00t,classification,core,default,events,full,hsm,legacy,legal-z3,llm,local-llm,mistralrs-llm,ontology,reconciliation,self-update,tax,xero' --message-format=json > clippy.json
          clippy-sarif < clippy.json > clippy.sarif

      - name: Upload Clippy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy.sarif

      - name: Install just
        run: cargo install just --locked

      - name: Check generated artifact drift (bindings.ts + mcp-capability-contract.md)
        run: just check-drift

      - name: Validate datum AST parser and linter
        run: cargo test -p datum 2>&1

      - name: Cargo test
        run: cargo test --workspace --all-targets --features 'audit,autoresearch,b00t,classification,core,default,events,full,hsm,legacy,legal-z3,llm,local-llm,mistralrs-llm,ontology,reconciliation,self-update,tax,xero'

      - name: Test legal-z3 feature with native Z3
        run: cargo test -p ledger-core --test legal_z3_integration --features legal-z3

      - name: Run MVP E2E flow
        run: ./scripts/e2e_mvp.sh

      - name: Build container
        run: docker build -t tax-ledger:ci .

      - name: Build ledgerr-mcp binary
        run: cargo build -p ledgerr-mcp --release --bin ledgerr-mcp-server

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledgerr-mcp
          path: target/release/ledgerr-mcp-server

  publish-mcp-registry:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ledgerr-mcp
          path: .

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get version
        run: echo "VERSION=v$(cargo pkgid -p ledgerr-mcp | cut -d'#' -f2)" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle .mcpb via xtask
        run: |
          mkdir -p dist
          cp ledgerr-mcp-server dist/
          cargo xtask-mcpb bundle \
            --binary dist/ledgerr-mcp-server \
            --output dist/ledgerr-mcp-x86_64-unknown-linux-gnu.mcpb \
            --version ${{ env.VERSION }}

      - name: Verify bundle
        run: cargo xtask-mcpb verify dist/ledgerr-mcp-x86_64-unknown-linux-gnu.mcpb

      - name: Upload MCPB as release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/ledgerr-mcp-x86_64-unknown-linux-gnu.mcpb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs-check:
    name: Validate GitHub Pages docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install just
        run: cargo install just --locked

      - name: Install mdBook toolchain
        run: |
          cargo install mdbook --version "$TOOL_MDBOOK_VERSION" --locked
          cargo install mdbook-mermaid --version "$TOOL_MDBOOK_MERMAID_VERSION" --locked

      - name: Install mdbook-admonish
        # TODO: pin to a released version once tommilligan/mdbook-admonish#235 merges
        run: cargo install --git https://github.com/padamson/mdbook-admonish.git --branch feat/mdbook-0.5-compat mdbook-admonish

      - name: Install mdbook-rhai-mermaid
        run: cargo install --path crates/mdbook-rhai-mermaid

      - name: Validate GitHub Pages docs payload
        run: just docgen-pages-check
