name: Publish Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-crates:
    runs-on: ubuntu-latest
    needs: publish-ghcr
    env:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout
        if: ${{ env.CRATES_IO_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Install Rust
        if: ${{ env.CRATES_IO_TOKEN != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ledger-core
        if: ${{ env.CRATES_IO_TOKEN != '' }}
        run: cargo publish -p ledger-core --token "${CRATES_IO_TOKEN}"

      - name: Wait for crates.io index propagation
        if: ${{ env.CRATES_IO_TOKEN != '' }}
        run: sleep 20

      - name: Publish ledgerr-mcp
        if: ${{ env.CRATES_IO_TOKEN != '' }}
        run: cargo publish -p ledgerr-mcp --token "${CRATES_IO_TOKEN}"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-ghcr
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        if: ${{ env.PYPI_API_TOKEN != '' }}
        working-directory: plugins/l3dg3rr-plugin-create/python
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: plugins/l3dg3rr-plugin-create/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
